<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066cc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#004999;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Circle background -->
  <circle cx="250" cy="250" r="240" fill="url(#grad)"/>

  <!-- Camera Icon (simplified) -->
  <g transform="translate(140, 130)">
    <rect x="30" y="20" width="90" height="65" rx="10" fill="none" stroke="#ff6b35" stroke-width="5"/>
    <circle cx="75" cy="52" r="22" fill="none" stroke="#ff6b35" stroke-width="4"/>
    <circle cx="75" cy="52" r="9" fill="#ff6b35"/>
    <circle cx="72" cy="49" r="3" fill="#ffffff" opacity="0.6"/>
  </g>

  <!-- Wi-Fi waves -->
  <g transform="translate(260, 115)">
    <path d="M15 55 Q25 48 25 60" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
    <path d="M8 48 Q25 38 42 48" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
    <path d="M3 42 Q25 28 47 42" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
    <circle cx="25" cy="63" r="4" fill="#ffffff"/>
  </g>

  <!-- Brand Name -->
  <text x="250" y="330" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-size="44" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="3">
    NET CAM
  </text>
  <text x="250" y="385" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-size="44" font-weight="800" fill="#ff6b35" text-anchor="middle" letter-spacing="3">
    SA
  </text>

  <!-- Small tagline -->
  <text x="250" y="435" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#cbd5e1" text-anchor="middle" letter-spacing="3" font-weight="500">
    NETWORKS &amp; CCTV
  </text>
</svg>